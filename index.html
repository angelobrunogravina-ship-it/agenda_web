<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Agenda PRO</title>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>

        body{
            font-family: Arial;
            margin:20px;
            background:#f4f6f8;
        }

        h1{
            margin-bottom:20px;
        }

        .top{
            display:flex;
            gap:20px;
            margin-top:20px;
            margin-bottom:20px;
            flex-wrap:wrap;
        }

        .form-box,
        .totali-box{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        input,
        select{
            padding:8px;
            margin:5px;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .btn-add{
            background:#27ae60;
            color:white;
        }

        .btn-save{
            background:#3498db;
            color:white;
        }

        .btn-delete{
            background:#e74c3c;
            color:white;
        }

        table{
            border-collapse:collapse;
            width:100%;
            background:white;
        }

        table th,
        table td{
            border:1px solid #ddd;
            padding:10px;
        }

        table th{
            background:#34495e;
            color:white;
        }

        tr:hover{
            background:#f1f1f1;
        }

        #calendar{
            margin-top:10px;
            margin-bottom:20px;
            background:white;
            padding:10px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            max-height:700px;
            overflow:auto;
        }

        .fc-day-sun{
            background:#dfe3e6 !important;
        }

    </style>

</head>

<body>

    <h1>Agenda PRO - by Angelo Bruno ver.7.07</h1>

    <!-- CALENDARIO SPOSTATO SOPRA -->

    <div id="calendar"></div>

    <div class="top">

        <div class="form-box">

            <h3>Nuovo Evento</h3>

            <select id="tipo">

                <option value="">Seleziona</option>

                <option>Ferie</option>
                <option>Ferie a.s. Precedente</option>
                <option>Legge 104</option>
                <option>Malattia</option>
                <option>Smart Working</option>
                <option>Altro</option>

            </select>

            <input type="date" id="inizio">

            <input type="date" id="fine">

            <input
                type="text"
                id="descrizione"
                placeholder="Descrizione"
            >

            <button
                class="btn-add"
                onclick="aggiungiEvento()"
            >
                Aggiungi
            </button>

            <button
                class="btn-save"
                onclick="salvaModifica()"
            >
                Salva Modifica
            </button>

        </div>

        <div class="totali-box">

            <h3>Totali Eventi</h3>

            <table id="tabellaTotali">

                <thead>

                    <tr>
                        <th>Tipo</th>
                        <th>Giorni</th>
                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <table id="tabella">

        <thead>

            <tr>

                <th>ID</th>
                <th>Tipo</th>
                <th>Dal</th>
                <th>Al</th>
                <th>Giorni</th>
                <th>Descrizione</th>
                <th>Azioni</th>

            </tr>

        </thead>

        <tbody></tbody>

    </table>

<script>

let calendario
let eventoModifica = null

document.addEventListener('DOMContentLoaded', async function () {

    calendario = new FullCalendar.Calendar(

        document.getElementById('calendar'),

        {

            initialView: 'dayGridMonth',

            height: 650,

            contentHeight: 600,

            aspectRatio: 1.8,

            locale: 'it',

            firstDay: 1,

            dayMaxEventRows: 3,

            moreLinkText: 'altre',

            moreLinkClick: 'popover',

            buttonText: {

                today: 'Oggi'

            }

        }

    )

    calendario.render()

    await caricaEventi()

    await caricaTotali()

})

async function caricaEventi() {

    const res = await fetch('/eventi')

    const eventi = await res.json()

    const tbody = document.querySelector('#tabella tbody')

    tbody.innerHTML = ''

    calendario.removeAllEvents()

    eventi.forEach(e => {

        tbody.innerHTML += `

            <tr>

                <td>${e.id}</td>

                <td>${e.tipo}</td>

                <td>${formattaData(e.data_inizio)}</td>

                <td>${formattaData(e.data_fine)}</td>

                <td>${e.giorni}</td>

                <td>${e.descrizione || ''}</td>

                <td>

                    <button onclick='modificaEvento(${JSON.stringify(e)})'>
                        Modifica
                    </button>

                    <button
                        class="btn-delete"
                        onclick='eliminaEvento(${e.id})'
                    >
                        Elimina
                    </button>

                </td>

            </tr>
        `

        calendario.addEvent({

            title: e.tipo,

            start: e.data_inizio,

            end: aggiungiUnGiorno(e.data_fine)

        })

    })

}

async function caricaTotali() {

    const res = await fetch('/totali')

    const dati = await res.json()

    const tbody = document.querySelector(
        '#tabellaTotali tbody'
    )

    tbody.innerHTML = ''

    for (const tipo in dati) {

        if (tipo === 'Legge 104')
            continue

        tbody.innerHTML += `

            <tr>

                <td>${tipo}</td>

                <td>${dati[tipo]}</td>

            </tr>

        `
    }
}

function aggiungiUnGiorno(data) {

    let d = new Date(data)

    d.setDate(d.getDate() + 1)

    return d.toISOString().split('T')[0]
}

function formattaData(dataISO) {

    const d = new Date(dataISO)

    const giorno = String(
        d.getDate()
    ).padStart(2, '0')

    const mese = String(
        d.getMonth() + 1
    ).padStart(2, '0')

    const anno = d.getFullYear()

    return `${giorno}/${mese}/${anno}`
}

async function aggiungiEvento() {

    const body = {

        tipo: document.getElementById('tipo').value,

        data_inizio: document.getElementById('inizio').value,

        data_fine: document.getElementById('fine').value,

        descrizione: document.getElementById('descrizione').value

    }

    const res = await fetch('/aggiungi', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify(body)

    })

    if (!res.ok) {

        alert('Errore')

        return
    }

    pulisci()

    await caricaEventi()

    await caricaTotali()
}

function modificaEvento(e) {

    eventoModifica = e.id

    document.getElementById('tipo').value = e.tipo

    document.getElementById('inizio').value = e.data_inizio

    document.getElementById('fine').value = e.data_fine

    document.getElementById('descrizione').value =
        e.descrizione || ''
}

async function salvaModifica() {

    if (!eventoModifica) {

        alert('Seleziona evento')

        return
    }

    const body = {

        tipo: document.getElementById('tipo').value,

        data_inizio: document.getElementById('inizio').value,

        data_fine: document.getElementById('fine').value,

        descrizione: document.getElementById('descrizione').value

    }

    const res = await fetch(

        '/update/' + eventoModifica,

        {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify(body)

        }

    )

    if (!res.ok) {

        alert('Errore')

        return
    }

    eventoModifica = null

    pulisci()

    await caricaEventi()

    await caricaTotali()
}

async function eliminaEvento(id) {

    if (!confirm('Eliminare evento?'))
        return

    await fetch('/delete/' + id, {
        method: 'POST'
    })

    await caricaEventi()

    await caricaTotali()
}

function pulisci() {

    document.getElementById('tipo').value = ''

    document.getElementById('inizio').value = ''

    document.getElementById('fine').value = ''

    document.getElementById('descrizione').value = ''

    eventoModifica = null
}

</script>

</body>
</html>
